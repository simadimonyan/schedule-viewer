name: Deploy Frontend to Beget

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Beget

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build
      env:
        VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        VITE_API_TOKEN: ${{ secrets.VITE_API_TOKEN }}

    - name: Deploy dist to server
      uses: appleboy/scp-action@v0.1.3
      with:
        host: ${{ secrets.BEGET_SSH_HOST }}
        username: ${{ secrets.BEGET_SSH_USER }}
        password: ${{ secrets.BEGET_SSH_PASSWORD }}
        source: "dist/"
        target: ${{ secrets.BEGET_DEPLOY_PATH }}
        overwrite: true

    - name: Reload nginx
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.BEGET_SSH_HOST }}
        username: ${{ secrets.BEGET_SSH_USER }}
        password: ${{ secrets.BEGET_SSH_PASSWORD }}
        script: |
          cd /root/schedule-parse-system/
          docker restart nginx
