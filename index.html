<!doctype html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Моя Академия</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        } catch (_) {}
      })();
    </script>

    <!-- Top.Mail.Ru / MyTracker counter — id 3762644.
         Загружается асинхронно ещё до main.ts, чтобы first pageView
         попал в окно Top.Mail.Ru до того, как Vue смонтирует роутер. -->
    <script type="text/javascript">
      var _tmr = window._tmr || (window._tmr = []);
      _tmr.push({ id: "3762644", type: "pageView", start: (new Date()).getTime() });
      (function (d, w, id) {
        if (d.getElementById(id)) return;
        var ts = d.createElement("script"); ts.type = "text/javascript"; ts.async = true; ts.id = id;
        ts.src = "https://top-fwz1.mail.ru/js/code.js";
        var f = function () {
          var s = d.getElementsByTagName("script")[0];
          s.parentNode.insertBefore(ts, s);
        };
        if (w.opera == "[object Opera]") {
          d.addEventListener("DOMContentLoaded", f, false);
        } else {
          f();
        }
      })(document, window, "tmr-code");
    </script>
    <noscript>
      <div>
        <img
          src="https://top-fwz1.mail.ru/counter?id=3762644;js=na"
          style="position:absolute;left:-9999px;"
          alt="Top.Mail.Ru"
        />
      </div>
    </noscript>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
